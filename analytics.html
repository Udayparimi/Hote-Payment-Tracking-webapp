<!DOCTYPE html>
<html>
<head>
    <title>Analytics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">

    <div class="logo">
        💳 PayTrack
    </div>

    <div class="nav-links">

        <a href="index.html">Home</a>

        <a href="payments.html">Payments</a>

        <a href="reports.html">Reports</a>

        <a href="analytics.html">Analytics</a>

        <a href="about.html">About</a>

    </div>

</nav>

<div class="page-header">
    <h1>📈 Analytics</h1>
    <p>Payment Method Distribution</p>
</div>

<div class="stats">

    <div class="card">
        <h3>UPI</h3>
        <h2 id="upi">0</h2>
    </div>

    <div class="card">
        <h3>Cash</h3>
        <h2 id="cash">0</h2>
    </div>

    <div class="card">
        <h3>Credit Card</h3>
        <h2 id="credit">0</h2>
    </div>

    <div class="card">
        <h3>Debit Card</h3>
        <h2 id="debit">0</h2>
    </div>

</div>

<footer>
    Built using HTML5, CSS3, JavaScript & Local Storage API
</footer>

<script>

const payments =
JSON.parse(localStorage.getItem("payments")) || [];

document.getElementById("upi")
.textContent =
payments.filter(
p => p.method === "UPI"
).length;

document.getElementById("cash")
.textContent =
payments.filter(
p => p.method === "Cash"
).length;

document.getElementById("credit")
.textContent =
payments.filter(
p => p.method === "Credit Card"
).length;

document.getElementById("debit")
.textContent =
payments.filter(
p => p.method === "Debit Card"
).length;

</script>

</body>
</html>
